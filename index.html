<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>製造業向けAIソリューション デモアプリ</title>
  <link rel="icon" href="assets/favicon.ico" />
  <link rel="stylesheet" href="styles.css?v=25" />
  <script type="module" src="vendor/model-viewer.min.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="title">製造業向けAIソリューション</span>
      <span class="tagline">図面・CAD解析 × 3D生成　デモアプリケーション</span>
    </div>
    <div class="brand-right">
      <span class="badge">DEMO</span>
      <img class="brand-logo" src="assets/logo_white.png" alt="LiberCraft" />
    </div>
  </header>

  <!-- モード切替（2D図面解析 / CAD解析） -->
  <nav class="modenav">
    <a class="mode active" href="index.html">2D図面（PDF）解析</a>
    <a class="mode" href="cad.html">CAD解析</a>
    <span class="modehint">紙・PDFの2D図面をAIが読み取り、寸法・公差を抽出して3D化します</span>
  </nav>

  <!-- サンプル選択 -->
  <nav class="samples" id="sampleNav"></nav>

  <main class="stage">
    <!-- 左：図面 -->
    <section class="panel drawing-panel">
      <div class="panel-head"><span class="dot"></span>2D 図面</div>
      <div class="drawing-wrap" id="drawingWrap">
        <img id="drawingImg" src="assets/drawing_01.png" alt="図面" />
        <div class="anno-layer" id="annoLayer"></div>
      </div>
    </section>

    <!-- 右：タブ（3Dモデル / 抽出結果） -->
    <section class="panel model-panel">
      <div class="panel-head">
        <span class="dot"></span>
        <div class="tabs">
          <button class="tab active" id="tabModel">3D モデル</button>
          <button class="tab" id="tabResult">抽出結果</button>
        </div>
      </div>
      <div class="model-wrap" id="modelWrap">
        <div class="model-placeholder" id="modelPlaceholder">
          <div class="ph-icon">⬡</div>
          <p id="phText">「②3Dモデルを生成」を押すと<br>図面の立体から 3D モデルを生成します</p>
        </div>
        <div class="loading" id="loading" hidden>
          <div class="spinner"></div>
          <p id="loadingText">3D メッシュを生成しています…</p>
        </div>
        <model-viewer id="viewer" hidden
          camera-controls auto-rotate auto-rotate-delay="0"
          rotation-per-second="24deg" shadow-intensity="1"
          exposure="1.0" environment-image="neutral"
          interaction-prompt="none">
        </model-viewer>
        <!-- 寸法抽出の結果テキスト一覧 -->
        <div class="result-list" id="resultList" hidden></div>
      </div>
    </section>
  </main>

  <!-- 操作バー -->
  <footer class="actionbar">
    <button class="btn btn-step" id="btnAnalyze">① 図面を解析</button>
    <button class="btn btn-primary" id="btnGen3d">② 3Dモデルを生成</button>
    <span class="sep"></span>
    <button class="btn btn-ghost" id="btnDims">📐 寸法を抽出</button>
    <button class="btn btn-ghost" id="btnDownload" disabled>⬇ OBJをダウンロード</button>
    <span class="hint" id="hint">「②3Dモデルを生成」または「📐寸法を抽出」を試せます</span>
  </footer>

  <script src="annotations.js?v=25"></script>
  <script src="app.js?v=25"></script>
</body>
</html>
